<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapiens AI | Research</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-pattern"></div> <!-- Cool pattern drawing -->
    
    <div class="app-wrapper">
        <nav class="top-nav">
            <div class="nav-section">
                <span class="nav-label">Archive History</span>
                <div id="hist" class="nav-pills"></div>
            </div>
        </nav>

        <header class="hero">
            <div class="logo-area">
                <span class="dot"></span>
                <h1>Sapiens AI</h1>
            </div>
            <p class="tagline">Global Research Synthesis</p>
            
            <div class="search-container">
                <div class="search-input-group">
                    <input type="text" id="q" placeholder="What are we researching today?">
                    <button onclick="doSearch()" id="searchBtn">Generate Report</button>
                </div>
            </div>
        </header>

        <div id="loader" class="hide">
            <div class="spinner"></div>
            <p>Scanning global archives...</p>
        </div>

        <main id="output" class="report-area"></main>
    </div>
    <script src="app.js"></script>
</body>
</html>
