<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapiens AI | Deep Research</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="blueprint-dots"></div>

    <!-- Top Left Google-Site Style Navigation -->
    <nav class="history-nav">
        <span class="nav-header">Archive History</span>
        <div id="hist" class="history-stack"></div>
    </nav>

    <div class="app-container">
        <header class="hero">
            <div class="logo-group">
                <div class="logo-square"></div>
                <h1>Sapiens AI</h1>
            </div>
            <p class="tagline">Educational Synthesis Engine</p>

            <div class="search-wrap">
                <input type="text" id="q" placeholder="Enter a topic for research...">
                <button onclick="doSearch()">Research</button>
            </div>
        </header>

        <div id="loader" class="hide">
            <div class="loader-line"></div>
            <p>Accessing Global Knowledge Bases...</p>
        </div>

        <main id="output" class="report-fade-in"></main>
    </div>
    <script src="app.js"></script>
</body>
</html>
