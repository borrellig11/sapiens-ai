<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapiens AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="blueprint-bg"></div>

    <!-- History in Top-Left as a sub-heading -->
    <nav class="side-history">
        <span class="nav-label">Archive History</span>
        <div id="hist" class="hist-list"></div>
    </nav>

    <div class="container">
        <header class="hero">
            <div class="logo">
                <div class="dot"></div>
                <h1>Sapiens AI</h1>
            </div>
            <p class="tag">Knowledge Synthesis Engine</p>
            
            <div class="search-bubble">
                <input type="text" id="q" placeholder="Enter research topic...">
                <button onclick="doSearch()">Generate Page</button>
            </div>
        </header>

        <div id="loader" class="hide">
            <div class="spin"></div>
            <p>Accessing global archives...</p>
        </div>

        <main id="output"></main>
    </div>
    <script src="app.js"></script>
</body>
</html>
